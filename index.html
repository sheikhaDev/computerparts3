<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons -->
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body {font-family:'Tajawal',sans-serif;overflow-x:hidden;overflow-y:auto;margin:0;}
.page{display:none;min-height:100vh}
.page.active{display:block}
</style>
</head>

<body>

<!-- الصفحة 1 -->
<div class="page active" id="page0">
  <div class="text-center p-10">
    <h1 class="text-3xl font-bold text-blue-700 mb-4">رحلة إلى أجزاء الحاسوب</h1>
    <p class="mb-6">اضغط لبدء الدرس</p>
    <button onclick="go(1)" class="bg-blue-600 text-white px-6 py-2 rounded">ابدأ</button>
  </div>
</div>

<!-- الصفحة 2 -->
<div class="page" id="page1">
  <div class="p-10">
    <h2 class="text-2xl font-bold mb-4">وحدات الإدخال</h2>
    <p class="mb-4">هي الأجهزة التي تُدخل البيانات إلى الحاسوب</p>
    <button onclick="go(0)" class="bg-gray-400 px-4 py-2 rounded">رجوع</button>
    <button onclick="go(2)" class="bg-blue-600 text-white px-4 py-2 rounded">التالي</button>
  </div>
</div>

<!-- الصفحة 3 -->
<div class="page" id="page2">
  <div class="p-10">
    <h2 class="text-2xl font-bold mb-4">وحدات الإخراج</h2>
    <p class="mb-4">هي الأجهزة التي تعرض النتائج</p>
    <button onclick="go(1)" class="bg-gray-400 px-4 py-2 rounded">رجوع</button>
  </div>
</div>

<script>
function go(n){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById('page'+n).classList.add('active');
}

lucide.createIcons();
</script>

</body>
</html>
